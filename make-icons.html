<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>宅建 アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#1f1410;color:#ede4d8;">
<h2 style="color:#e8804f;">宅建 アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #4a3528;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #4a3528;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#e8804f;color:#1f1410;border:none;cursor:pointer;font-weight:700;">icon-192.png をダウンロード</button>
<button onclick="dl('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#e8804f;color:#1f1410;border:none;cursor:pointer;font-weight:700;">icon-512.png をダウンロード</button>
<script>
function draw(id){
  const c=document.getElementById(id); const s=c.width; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,s,s); g.addColorStop(0,'#1f1410'); g.addColorStop(1,'#4a1d10');
  const r=s*0.18; ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // 家のシルエット風ライン
  ctx.strokeStyle='rgba(232,128,79,0.18)'; ctx.lineWidth=s*0.014;
  ctx.beginPath(); ctx.moveTo(s*0.15,s*0.5); ctx.lineTo(s*0.5,s*0.22); ctx.lineTo(s*0.85,s*0.5); ctx.stroke();
  ctx.strokeRect(s*0.25,s*0.5,s*0.5,s*0.32);
  // 宅
  ctx.fillStyle='#e8804f'; ctx.font=`bold ${s*0.4}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(232,128,79,0.5)'; ctx.shadowBlur=s*0.07;
  ctx.fillText('宅', s*0.5, s*0.44);
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font=`bold ${s*0.11}px sans-serif`;
  ctx.fillText('一問一答', s*0.5, s*0.76);
}
function dl(id,name){ const c=document.getElementById(id); const a=document.createElement('a'); a.download=name; a.href=c.toDataURL('image/png'); a.click(); }
draw('c192'); draw('c512');
</script>
</body>
</html>
